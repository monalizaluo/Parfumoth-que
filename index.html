<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scent Identity | L'Oréal Luxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.75);
            --gradient: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            --accent-pink: #ffdce5;
            --accent-purple: #e2d1f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #eee1ff, #fde2e4, #e2f1f8, #f8f9ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #444;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-container {
            width: 100%;
            max-width: 380px;
            height: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 45px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow-y: auto;
            scrollbar-width: none;
        }

        #app-container::-webkit-scrollbar { display: none; }

        .screen { padding: 30px; display: none; animation: fadeIn 0.6s ease; }
        .active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 3px; text-align: center; margin-bottom: 5px; color: #1a1a1a; }
        .sub-logo { font-size: 0.65rem; text-align: center; letter-spacing: 1px; color: #888; text-transform: uppercase; margin-bottom: 30px;}

        h2 { font-weight: 400; font-size: 1.2rem; line-height: 1.4; color: #222; margin-bottom: 25px; }

        /* Form Styling */
        input[type="text"], input[type="number"], select {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid transparent;
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .option-btn:hover { background: white; transform: scale(1.02); border-color: #d1c4e9; }

        /* Fragrantica Style Results */
        .accord-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; }
        .accord-bar { height: 22px; border-radius: 4px; margin-left: 10px; transition: width 1s ease-out; }

        .rating-box { 
            background: rgba(255,255,255,0.4); 
            padding: 12px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 0.7rem;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .discount-pill {
            background: linear-gradient(90deg, #ffdde1, #ee9ca7);
            color: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }

        .primary-btn {
            background: #1a1a1a;
            color: white;
            padding: 18px;
            border-radius: 30px;
            border: none;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="screen-1" class="screen active">
        <div class="brand-logo">L'ORÉAL LUXE</div>
        <div class="sub-logo">SCENT IDENTITY MACHINE</div>
        <h2 style="text-align: center;">Welcome to your multi-sensory journey.</h2>
        
        <input type="text" id="user-name" placeholder="Your Name">
        <input type="number" id="user-age" placeholder="Age">
        <select id="user-gender">
            <option value="">Select Gender</option>
            <option value="Woman">Woman</option>
            <option value="Man">Man</option>
            <option value="Non-Binary">Non-Binary</option>
        </select>
        
        <button class="primary-btn" onclick="nextScreen(2)">Start Consultation</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="brand-logo">L'ORÉAL LUXE</div>
        <h2 id="question-text">Question goes here?</h2>
        <div id="options-container"></div>
    </div>

    <div id="screen-result" class="screen">
        <div class="sub-logo">PERSONAL OLFACTIVE BLUEPRINT</div>
        <h1 id="res-name" style="font-family: 'Playfair Display'; margin: 0;">Fragrance Name</h1>
        <p id="res-vibe" style="font-size: 0.8rem; color: #888; margin-top: 5px;">AURA: CLEAN GIRL</p>

        <div style="text-align: center; margin: 30px 0;">
            <img id="res-img" src="https://www.yslbeautyus.com/dw/image/v2/AABV_PRD/on/demandware.static/-/Sites-ysl-master-catalog/default/dw83748281/Libre_EDP/3614272648418_libre_eau_de_parfum_50ml.jpg?sw=600&sh=600&sm=fit" style="width: 150px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.1));">
        </div>

        <div id="accords-list">
            <small style="display: block; margin-bottom: 10px; color: #999;">MAIN ACCORDS</small>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px;">
            <div class="rating-box">❄️<br>Winter<br><b>Med</b></div>
            <div class="rating-box">☀️<br>Summer<br><b>High</b></div>
            <div class="rating-box">🌙<br>Night<br><b>Low</b></div>
        </div>

        <div class="discount-pill">
            AMPOULE LAB UNLOCKED: <span id="discount-amt">15%</span> OFF
        </div>

        <button class="primary-btn" onclick="location.reload()" style="background: none; color: #444; border: 1px solid #ddd; margin-top: 15px;">Restart Analysis</button>
    </div>
</div>

<script>
    let currentStep = 0;
    let scores = { woody: 0, floral: 0, fresh: 0, gourmand: 0 };

    const questions = [
        {
            q: "What is your ideal weekend getaway?",
            options: [
                { t: "Cozy cabin in the woods", s: "woody" },
                { t: "Chic city boutique hotel", s: "floral" },
                { t: "Breezy beach house", s: "fresh" },
                { t: "Bustling spice market", s: "gourmand" }
            ]
        },
        {
            q: "Pick a fabric that feels most like you:",
            options: [
                { t: "Edgy leather", s: "woody" },
                { t: "Romantic silk", s: "floral" },
                { t: "Crisp linen", s: "fresh" },
                { t: "Soft cashmere", s: "gourmand" }
            ]
        },
        {
            q: "What's your go-to drink order?",
            options: [
                { t: "Dark Roast Coffee", s: "woody" },
                { t: "Sparkling Rosé", s: "floral" },
                { t: "Gin & Tonic", s: "fresh" },
                { t: "Creamy Vanilla Latte", s: "gourmand" }
            ]
        }
    ];

    function nextScreen(scr) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(scr === 2) {
            document.getElementById('screen-quiz').classList.add('active');
            loadQuestion();
        }
    }

    function loadQuestion() {
        if (currentStep < questions.length) {
            const data = questions[currentStep];
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt.t;
                btn.onclick = () => { scores[opt.s]++; currentStep++; loadQuestion(); };
                container.appendChild(btn);
            });
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');

        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const nameDisplay = document.getElementById('res-name');
        const vibeDisplay = document.getElementById('res-vibe');
        const accords = document.getElementById('accords-list');
        const disc = document.getElementById('discount-amt');

        disc.innerText = [5, 10, 15][Math.floor(Math.random() * 3)];

        if(winner === 'floral') {
            nameDisplay.innerText = "YSL Libre";
            vibeDisplay.innerText = "AURA: CHIC & FLORAL";
            renderAccords([
                {n: 'White Floral', w: '95%', c: '#e2f0ff'},
                {n: 'Citrus', w: '70%', c: '#ffffd1'},
                {n: 'Lavender', w: '60%', c: '#e6d1ff'}
            ]);
        } else if(winner === 'woody') {
            nameDisplay.innerText = "YSL Tuxedo";
            vibeDisplay.innerText = "AURA: EDGY & EARTHY";
            renderAccords([
                {n: 'Patchouli', w: '90%', c: '#e8d8c3'},
                {n: 'Spicy', w: '75%', c: '#ffd1d1'},
                {n: 'Amber', w: '60%', c: '#ffebd1'}
            ]);
        } else if(winner === 'fresh') {
            nameDisplay.innerText = "Armani Acqua di Gioia";
            vibeDisplay.innerText = "AURA: CLEAN GIRL";
            renderAccords([
                {n: 'Aromatic', w: '95%', c: '#d1fff0'},
                {n: 'Fresh', w: '80%', c: '#d1f4ff'},
                {n: 'Citrus', w: '65%', c: '#ffffd1'}
            ]);
        } else {
            nameDisplay.innerText = "Lancôme Idôle";
            vibeDisplay.innerText = "AURA: ROMANTIC GOURMAND";
            renderAccords([
                {n: 'Sweet', w: '90%', c: '#ffd1df'},
                {n: 'Rose', w: '85%', c: '#ffebf0'},
                {n: 'Vanilla', w: '70%', c: '#f9ffd1'}
            ]);
        }
    }

    function renderAccords(items) {
        const list = document.getElementById('accords-list');
        items.forEach(i => {
            const row = document.createElement('div');
            row.className = 'accord-row';
            row.innerHTML = `<span>${i.n}</span><div class="accord-bar" style="width:${i.w}; background:${i.c};"></div>`;
            list.appendChild(row);
        });
    }
</script>

</body>
</html>
