<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parfumothèque | L'Oréal Luxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.75);
            --gradient: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            --accent-pink: #ffdce5;
            --accent-purple: #e2d1f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #eee1ff, #fde2e4, #e2f1f8, #f8f9ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #444;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-container {
            width: 100%;
            max-width: 380px;
            height: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 45px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow-y: auto;
            scrollbar-width: none;
        }

        #app-container::-webkit-scrollbar { display: none; }

        .screen { padding: 30px; display: none; animation: fadeIn 0.6s ease; }
        .active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 2px; text-align: center; margin-bottom: 5px; color: #1a1a1a; }
        .sub-logo { font-size: 0.65rem; text-align: center; letter-spacing: 1px; color: #888; text-transform: uppercase; margin-bottom: 30px;}

        h2 { font-weight: 400; font-size: 1.1rem; line-height: 1.4; color: #222; margin-bottom: 20px; text-align: center;}

        input[type="text"], input[type="number"], select {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid transparent;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            font-size: 0.85rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .option-btn:hover { background: white; transform: scale(1.02); border-color: #d1c4e9; }

        .accord-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; }
        .accord-bar { height: 18px; border-radius: 4px; margin-left: 10px; transition: width 1s ease-out; }

        .rating-box { 
            background: rgba(255,255,255,0.4); 
            padding: 12px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 0.7rem;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .discount-pill {
            background: linear-gradient(90deg, #ffdde1, #ee9ca7);
            color: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }

        .primary-btn {
            background: #1a1a1a;
            color: white;
            padding: 18px;
            border-radius: 30px;
            border: none;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="screen-1" class="screen active">
        <div class="brand-logo">Parfumothèque</div>
        <div class="sub-logo">L'ORÉAL LUXE SCENT IDENTITY</div>
        <h2>Discover your hyper-personalized olfactive blueprint.</h2>
        
        <input type="text" id="user-name" placeholder="Your Name">
        <input type="number" id="user-age" placeholder="Age">
        <select id="user-gender">
            <option value="">Select Gender</option>
            <option value="Woman">Woman</option>
            <option value="Man">Man</option>
            <option value="Non-Binary">Non-Binary</option>
        </select>
        
        <button class="primary-btn" onclick="nextScreen(2)">Begin Consultation</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="brand-logo" style="font-size: 1.2rem;">Parfumothèque</div>
        <div id="progress-bar" style="font-size: 0.6rem; text-align: center; color: #aaa; margin-bottom: 15px;">STEP 1 OF 12</div>
        <h2 id="question-text">Question?</h2>
        <div id="options-container"></div>
    </div>

    <div id="screen-result" class="screen">
        <div class="sub-logo">YOUR PERSONAL PERSONA</div>
        <h1 id="res-persona" style="font-family: 'Playfair Display'; margin: 0; text-align: center; color: #1a1a1a;">The Minimalist</h1>
        <p id="res-vibe" style="font-size: 0.8rem; color: #888; margin-top: 5px; text-align: center; text-transform: uppercase;">AURA: CLEAN GIRL</p>

        <div style="text-align: center; margin: 20px 0;">
            <img id="res-img" src="" style="width: 180px; height: 180px; object-fit: contain; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.1));">
            <p id="res-perfume-name" style="font-weight: 600; margin-top: 10px;">YSL Libre</p>
        </div>

        <div id="accords-list">
            <small style="display: block; margin-bottom: 10px; color: #999;">MAIN ACCORDS</small>
        </div>

        <div class="discount-pill">
            AMPOULE LAB UNLOCKED: <span id="discount-amt">15%</span> OFF
        </div>

        <button class="primary-btn" onclick="location.reload()" style="background: none; color: #444; border: 1px solid #ddd; margin-top: 15px;">Redo Analysis</button>
    </div>
</div>

<script>
    let currentStep = 0;
    // Categories: Minimalist (Fresh), Midnight (Spicy/Woody), SunDrenched (Citrus/Floral), UrbanAcademic (Earth/Leather)
    let scores = { min: 0, mid: 0, sun: 0, urb: 0 };

    const questions = [
        { q: "What is your ideal weekend getaway?", options: [
            { t: "A breezy beach house", s: "sun" }, { t: "A cozy cabin in the woods", s: "urb" }, 
            { t: "A chic city boutique hotel", s: "min" }, { t: "A bustling spice market", s: "mid" }
        ]},
        { q: "How does your skin usually behave?", options: [
            { t: "Dry (scent disappears quickly)", s: "mid" }, { t: "Oily (scent intensifies)", s: "min" }, { t: "Sensitive", s: "sun" }
        ]},
        { q: "What is the weather like where you live?", options: [
            { t: "Humidity / Tropical", s: "sun" }, { t: "Dry Desert Heat", s: "min" }, 
            { t: "Crisp / Cold", s: "mid" }, { t: "Constantly Raining", s: "urb" }
        ]},
        { q: "What color palette dominates your wardrobe?", options: [
            { t: "Neutrals & Earth tones", s: "urb" }, { t: "All Black", s: "mid" }, 
            { t: "Pastels & Whites", s: "min" }, { t: "Bright & Bold", s: "sun" }
        ]},
        { q: "What is your 'signature' jewelry style?", options: [
            { t: "Minimalist gold/silver", s: "min" }, { t: "Vintage / Antique", s: "urb" }, 
            { t: "Chunky / Statement", s: "mid" }, { t: "I don't wear any", s: "sun" }
        ]},
        { q: "How would your best friend describe your energy?", options: [
            { t: "The CEO (Powerful/Sharp)", s: "mid" }, { t: "The 'Mom' (Nurturing)", s: "min" }, 
            { t: "The Artist (Mysterious)", s: "urb" }, { t: "Life of the Party", s: "sun" }
        ]},
        { q: "Which 'core memory' feels most comforting?", options: [
            { t: "Fresh laundry sheets", s: "min" }, { t: "Old library books", s: "urb" }, 
            { t: "Peeling an orange in the sun", s: "sun" }, { t: "Rain on hot pavement", s: "mid" }
        ]},
        { q: "If you were a texture, what would you be?", options: [
            { t: "Velvet (Heavy/Deep)", s: "mid" }, { t: "Chiffon (Light/Airy)", s: "min" }, 
            { t: "Suede (Smooth/Earth)", s: "urb" }, { t: "Denim (Practical)", s: "sun" }
        ]},
        { q: "What is your primary goal for this scent?", options: [
            { t: "To feel powerful", s: "mid" }, { t: "To feel relaxed/calm", s: "urb" }, 
            { t: "To feel clean/put-together", s: "min" }, { t: "To attract a partner", s: "sun" }
        ]},
        { q: "How do you feel about 'Synthetic' vs 'Natural'?", options: [
            { t: "I love that 'clean molecular' vibe", s: "min" }, { t: "I want to smell like a literal forest", s: "urb" }
        ]}
    ];

    function nextScreen(scr) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(scr === 2) {
            document.getElementById('screen-quiz').classList.add('active');
            loadQuestion();
        }
    }

    function loadQuestion() {
        if (currentStep < questions.length) {
            const data = questions[currentStep];
            document.getElementById('progress-bar').innerText = `STEP ${currentStep + 1} OF ${questions.length}`;
            document.getElementById('question-text').innerText = data.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt.t;
                btn.onclick = () => { scores[opt.s]++; currentStep++; loadQuestion(); };
                container.appendChild(btn);
            });
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');

        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const personaTitle = document.getElementById('res-persona');
        const vibeDisplay = document.getElementById('res-vibe');
        const perfumeName = document.getElementById('res-perfume-name');
        const perfumeImg = document.getElementById('res-img');

        if(winner === 'min') {
            personaTitle.innerText = "The Minimalist";
            vibeDisplay.innerText = "Aura: Clean Girl / Professional";
            perfumeName.innerText = "Armani Privé Thé Yulong";
            perfumeImg.src = "https://media.douglas.de/media/v1642498263/de/products/406084.jpg"; // Placeholder link
            renderAccords([{n: 'Green Tea', w: '95%', c: '#d1f4ff'}, {n: 'Citrus', w: '70%', c: '#ffffd1'}]);
        } else if(winner === 'mid') {
            personaTitle.innerText = "The Midnight Muse";
            vibeDisplay.innerText = "Aura: Sultry / Mysterious";
            perfumeName.innerText = "YSL Black Opium Le Parfum";
            perfumeImg.src = "https://www.yslbeauty.co.uk/dw/image/v2/AABV_PRD/on/demandware.static/-/Sites-ysl-master-catalog/default/dw1554167e/fragrance/Black_Opium/Le_Parfum/3614273822183_black_opium_le_parfum_50ml.jpg";
            renderAccords([{n: 'Vanilla', w: '90%', c: '#f9ffd1'}, {n: 'Coffee', w: '75%', c: '#e8d8c3'}]);
        } else if(winner === 'sun') {
            personaTitle.innerText = "The Sun-Drenched";
            vibeDisplay.innerText = "Aura: Vibrant / Warm";
            perfumeName.innerText = "Lancôme Idôle";
            perfumeImg.src = "https://www.lancome-usa.com/dw/image/v2/AABV_PRD/on/demandware.static/-/Sites-lancome-master-catalog/default/dw62963162/products/idole/Idole_Aura_Eau_De_Parfum_Intense.jpg";
            renderAccords([{n: 'Rose', w: '90%', c: '#ffd1df'}, {n: 'Salt Air', w: '65%', c: '#d1f4ff'}]);
        } else {
            personaTitle.innerText = "The Urban Academic";
            vibeDisplay.innerText = "Aura: Intellectual / Grounded";
            perfumeName.innerText = "Maison Margiela REPLICA Whispers in the Library";
            perfumeImg.src = "https://www.maisonmargiela-fragrances.us/dw/image/v2/AABV_PRD/on/demandware.static/-/Sites-margiela-master-catalog/default/dw76953331/Whispers_in_the_Library/Whispers_Library_100ml.jpg";
            renderAccords([{n: 'Sandalwood', w: '85%', c: '#e8d8c3'}, {n: 'Paper/Wood', w: '80%', c: '#f5f5f5'}]);
        }
    }

    function renderAccords(items) {
        const list = document.getElementById('accords-list');
        list.innerHTML = '<small style="display: block; margin-bottom: 10px; color: #999;">MAIN ACCORDS</small>';
        items.forEach(i => {
            const row = document.createElement('div');
            row.className = 'accord-row';
            row.innerHTML = `<span>${i.n}</span><div class="accord-bar" style="width:${i.w}; background:${i.c};"></div>`;
            list.appendChild(row);
        });
    }
</script>

</body>
</html>
